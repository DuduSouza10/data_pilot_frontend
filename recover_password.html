<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facilita Financeiro | Recuperar senha</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    :root {
      --bg: #080c14;
      --card: #101827;
      --blue: #1e90ff;
      --blue-hover: #0f75d8;
      --text: #f4f7fb;
      --muted: #9ca8ba;
      --border: #24324a;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #10284a 0%, var(--bg) 45%, #05070c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 20px;
    }

    .recover-box {
      width: 100%;
      max-width: 430px;
      background: rgba(16, 24, 39, 0.94);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 42px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
    }

    .recover-box::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(30, 144, 255, 0.18);
      filter: blur(12px);
      top: -90px;
      right: -90px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      font-size: 22px;
      font-weight: 800;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: var(--blue);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      box-shadow: 0 0 35px rgba(30, 144, 255, 0.55);
    }

    h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #d8e2f0;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      outline: none;
      font-size: 15px;
      transition: 0.25s;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(30, 144, 255, 0.12);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 15px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      background: var(--blue-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(30, 144, 255, 0.24);
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 700;
      padding: 8px;
      border-radius: 10px;
      transition: 0.25s;
    }

    .back:hover {
      color: var(--blue);
      background: rgba(30, 144, 255, 0.08);
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: rgba(255, 77, 77, 0.12);
      border: 1px solid rgba(255, 77, 77, 0.35);
      color: #ffb3b3;
    }

    .message.success {
      background: rgba(48, 209, 88, 0.12);
      border: 1px solid rgba(48, 209, 88, 0.35);
      color: #b8ffc8;
    }

    .loading {
      opacity: 0.75;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <main class="recover-box">
    <div class="content">
      <div class="logo">
        <div class="logo-icon">F</div>
        <span>Facilita Financeiro</span>
      </div>

      <h1>Recuperar senha</h1>
      <p>Digite o email cadastrado para receber as instruções de recuperação.</p>

      <form id="recoverForm">
        <div class="input-group">
          <label for="recoverEmail">Email cadastrado</label>
          <input type="email" id="recoverEmail" placeholder="seuemail@exemplo.com" required />
        </div>

        <button type="submit">Enviar recuperação</button>

        <div id="recoverMessage" class="message"></div>
      </form>

      <a href="login_screen.html" class="back">← Voltar para login</a>
    </div>
  </main>

  <script>
    const API_BASE_URL = "http://localhost:8000";

    const recoverForm = document.getElementById("recoverForm");

    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = `message show ${type}`;
    }

    function clearMessage(element) {
      element.textContent = "";
      element.className = "message";
    }

    recoverForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const message = document.getElementById("recoverMessage");
      clearMessage(message);

      const email = document.getElementById("recoverEmail").value.trim();

      if (!email) {
        showMessage(message, "Digite o email cadastrado.", "error");
        return;
      }

      try {
        recoverForm.classList.add("loading");

        const response = await fetch(`${API_BASE_URL}/forgot-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Não foi possível iniciar a recuperação de senha.");
        }

        showMessage(
          message,
          data.message || "Se o email estiver cadastrado, enviaremos as instruções de recuperação.",
          "success"
        );
      } catch (error) {
        showMessage(message, error.message, "error");
      } finally {
        recoverForm.classList.remove("loading");
      }
    });
  </script>
</body>
</html>
